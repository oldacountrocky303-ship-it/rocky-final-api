<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rocky Video API</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Segoe UI',sans-serif;color:#fff}
    header{display:flex;align-items:center;gap:14px;padding:20px 24px;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.1)}
    header img{width:46px;height:46px;border-radius:50%;border:2px solid #a78bfa;object-fit:cover}
    header .brand h1{font-size:1.3rem;color:#c4b5fd}
    header .brand p{font-size:0.75rem;color:#94a3b8}
    .hero{text-align:center;padding:44px 20px 24px}
    .hero h2{font-size:1.9rem;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
    .hero p{color:#94a3b8;font-size:0.9rem}
    .search-wrap{max-width:620px;margin:28px auto 10px;padding:0 16px;display:flex;gap:10px}
    .search-wrap input{flex:1;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(167,139,250,0.4);background:rgba(255,255,255,0.07);color:#fff;font-size:1rem;outline:none;transition:border .2s}
    .search-wrap input::placeholder{color:#64748b}
    .search-wrap input:focus{border-color:#a78bfa}
    .search-wrap button{padding:13px 20px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    .search-wrap button:hover{opacity:.85}
    .search-wrap button:disabled{opacity:.5;cursor:not-allowed}
    #status{text-align:center;font-size:.88rem;color:#94a3b8;min-height:22px;margin-bottom:8px}
    #results{max-width:780px;margin:0 auto;padding:10px 16px 60px;display:grid;gap:14px}
    .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;display:flex;gap:12px;padding:12px;align-items:flex-start;transition:transform .2s}
    .card:hover{transform:translateY(-2px);background:rgba(255,255,255,0.09)}
    .card img{width:130px;height:80px;object-fit:cover;border-radius:10px;flex-shrink:0;background:#1e1b4b}
    .card-info{flex:1;min-width:0}
    .card-info h3{font-size:.92rem;font-weight:600;color:#e2e8f0;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-info .ch{font-size:.75rem;color:#94a3b8;margin-bottom:8px}
    .dl-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    .dl-btn:hover{opacity:.85}
    .dl-btn:disabled{opacity:.5;cursor:not-allowed;background:#374151}
    footer{text-align:center;padding:18px;font-size:.75rem;color:#475569;border-top:1px solid rgba(255,255,255,0.05)}
    footer span{color:#a78bfa}
  </style>
</head>
<body>
<header>
  <img src="https://i.imgur.com/NdnkE7H.jpeg" alt="Rocky" onerror="this.style.display='none'"/>
  <div class="brand">
    <h1>Rocky Video API</h1>
    <p>by Rocky Chowdhury • YouTube Downloader</p>
  </div>
</header>
<div class="hero">
  <h2>🎬 YouTube Video Downloader</h2>
  <p>Search any video and download instantly</p>
</div>
<div class="search-wrap">
  <input type="text" id="q" placeholder="Search video or paste YouTube link..."/>
  <button id="btn" onclick="go()">Search</button>
</div>
<p id="status"></p>
<div id="results"></div>
<footer>Powered by <span>Rocky Video API</span> • Made by <span>Rocky Chowdhury</span></footer>
<script>
  const BASE=window.location.origin;
  document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")go()});
  async function go(){
    const q=document.getElementById("q").value.trim();
    if(!q)return;
    const yt=q.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
    if(yt){await dlDirect(yt[1],"YouTube Video");return;}
    const btn=document.getElementById("btn");
    btn.disabled=true;setStatus("🔍 Searching...");
    document.getElementById("results").innerHTML="";
    try{
      const r=await fetch(`${BASE}/api/video/search?songName=${encodeURIComponent(q)}`);
      const d=await r.json();
      if(d.error){setStatus("❌ "+d.error);return;}
      setStatus(`✅ Found ${d.length} results`);
      d.forEach(v=>addCard(v));
    }catch(e){setStatus("❌ "+e.message);}
    finally{btn.disabled=false;}
  }
  function addCard(v){
    const c=document.createElement("div");c.className="card";
    c.innerHTML=`<img src="${v.thumbnail}" loading="lazy"/><div class="card-info"><h3>${esc(v.title)}</h3><div class="ch">📺 ${esc(v.channel)}</div><button class="dl-btn" onclick="dlVideo('${v.id}',this,'${esc2(v.title)}')">⬇️ Download MP4</button></div>`;
    document.getElementById("results").appendChild(c);
  }
  async function dlDirect(id,title){
    setStatus("⏳ Getting link...");
    try{
      const r=await fetch(`${BASE}/api/video/download?link=${id}&format=mp4`);
      const d=await r.json();
      if(d.downloadLink){setStatus("✅ Starting download...");openDl(d.downloadLink,d.title||title);}
      else setStatus("❌ "+(d.error||"Failed"));
    }catch(e){setStatus("❌ "+e.message);}
  }
  async function dlVideo(id,btn,title){
    btn.disabled=true;btn.textContent="⏳ Loading...";
    try{
      const r=await fetch(`${BASE}/api/video/download?link=${id}&format=mp4`);
      const d=await r.json();
      if(d.downloadLink){btn.textContent="✅ Done!";openDl(d.downloadLink,d.title||title);}
      else{btn.textContent="❌ Failed";}
    }catch(e){btn.textContent="❌ Error";}
    setTimeout(()=>{btn.disabled=false;btn.innerHTML="⬇️ Download MP4";},3000);
  }
  function openDl(url,name){
    const a=document.createElement("a");a.href=url;a.download=(name||"video")+".mp4";
    a.target="_blank";a.rel="noopener";document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function setStatus(t){document.getElementById("status").textContent=t;}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function esc2(s){return String(s).replace(/'/g,"\\'");}
</script>
</body>
</html>
